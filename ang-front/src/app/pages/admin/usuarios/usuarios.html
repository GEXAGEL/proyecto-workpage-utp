<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-users me-2"></i>Gestión de Usuarios</h2>
        <button class="btn btn-secondary" (click)="goBack()">
            <i class="fas fa-arrow-left me-2"></i>Volver al Panel
        </button>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Nombre Completo</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            @for (user of usuarios(); track user.id) {
                <tr>
                    <td>{{ user.id }}</td>
                    <td class="fw-semibold">{{ user.username }}</td>
                    <td>{{ user.nombreCompleto }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <span class="badge"
                              [ngClass]="user.rol === 'ADMIN' ? 'bg-danger' : 'bg-primary'">
                            {{ user.rol }}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-warning me-2"
                                data-bs-toggle="modal"
                                data-bs-target="#cambiarRolModal"
                                (click)="openRoleModal(user)">
                            <i class="fas fa-user-cog me-1"></i> Cambiar Rol
                        </button>
                        <button (click)="onEliminar(user.id)" class="btn btn-sm btn-danger">
                            <i class="fas fa-trash me-1"></i> Eliminar
                        </button>
                    </td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="6" class="text-center py-4 text-muted">
                        No hay usuarios registrados
                    </td>
                </tr>
            }
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Cambiar Rol -->
<div class="modal fade" id="cambiarRolModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title fw-bold">Cambiar Rol</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form (ngSubmit)="onCambiarRol()">
                <div class="modal-body">
                    <p class="mb-3">Usuario: <strong class="text-primary">{{ roleUpdate.username }}</strong></p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nuevo Rol</label>
                        <select class="form-control" name="nuevoRol" [(ngModel)]="roleUpdate.nuevoRol" required>
                            <option value="CLIENTE">CLIENTE</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-warning">Cambiar</button>
                </div>
            </form>
        </div>
    </div>
</div>
